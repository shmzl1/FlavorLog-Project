services:
  postgres:
    image: postgres:16
    container_name: flavorlog-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: flavorlog
      POSTGRES_USER: flavorlog_user
      POSTGRES_PASSWORD: flavorlog_password
      TZ: Asia/Shanghai
    ports:
      - "5433:5432"  # 重点：左边的 5432 改成 5433！
    volumes:
      - flavorlog_postgres_data:/var/lib/postgresql/data
      - ./backend/database/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flavorlog_user -d flavorlog"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  flavorlog_postgres_data: